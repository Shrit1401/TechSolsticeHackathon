services:
  user-service:
    build: ./user-service
    ports:
      - "8001:8001"

  payment-service:
    container_name: payment-service
    build: ./payment-service
    ports:
      - "8002:8002"

  order-service:
    build: ./order-service
    ports:
      - "8004:8004"

  inventory-service:
    build: ./inventory-service
    ports:
      - "8005:8005"

  notification-service:
    build: ./notification-service
    ports:
      - "8006:8006"

  auth-service:
    build: ./auth-service
    ports:
      - "8007:8007"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    depends_on:
      - user-service
      - payment-service
      - order-service
      - inventory-service
      - notification-service
      - auth-service
      - jaeger

  dashboard-service:
    build: ./dashboard-service
    ports:
      - "8010:8010"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      LOKI_URL: http://loki:3100/loki
      LOKI_HTTP_URL: http://loki:3100
      JAEGER_URL: http://jaeger:16686
      DETECTOR_URL: http://detector-service:8003
      GATEWAY_URL: http://api-gateway:8000
      GRAFANA_URL: http://grafana:3000
      LOCUST_HOST: http://api-gateway:8000
      CORS_ORIGINS: "*"
      ENABLE_SIMULATION: "1"
    depends_on:
      - api-gateway
      - prometheus
      - loki
      - jaeger
      - detector-service
      - grafana

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  detector-service:
    build:
      context: .
      dockerfile: detector-service/Dockerfile
    ports:
      - "8003:8003"
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      GATEWAY_METRICS_URL: http://api-gateway:8000
      LOKI_URL: http://loki:3100
      JAEGER_TRACES_URL: http://jaeger:16686/api/traces
      ENABLE_ML_ANOMALY: "1"
      ENABLE_LOG_ANOMALY: "1"
      ENABLE_TRACE_ANOMALY: "1"
      TRACE_ANALYSIS_INTERVAL_S: "30"
      LOG_ANALYSIS_INTERVAL_S: "30"
      LOG_FUSION_LOKI_QUERY: '{job="docker"}'
      LOG_FUSION_LIMIT: "200"
      LOG_FUSION_MINUTES: "15"
      LOG_FUSION_Z: "2.0"
      FUSION_W_METRIC: "0.4"
      FUSION_W_LOG: "0.35"
      FUSION_W_TRACE: "0.25"
      LOG_DISTANCE_TAU: "3.0"
      REALTIME_ML_INTERVAL_S: "30"
      ML_MODEL_PATH: /data/ml/models/lstm_model.h5
      ML_AE_MODEL_PATH: /data/ml/models/ae_model.h5
      ML_SCALER_PATH: /data/ml/sequences/sequences_scaler.joblib
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/ml:/data/ml:ro
    depends_on:
      - prometheus
      - api-gateway
      - loki
      - jaeger

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana-storage:/var/lib/grafana

  loki:
    image: grafana/loki:2.9.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - loki


volumes:
  grafana-storage: